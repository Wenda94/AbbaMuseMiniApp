<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="description" content="የአባ ሙሴ ጸሊም የተማሪዎች ህብረት ይፋዊ መተግበሪያ።">
    <title>አባ ሙሴ ጸሊም ህብረት</title>
    
    <!-- የአማርኛ ፎንት ከ Google (Noto Sans Ethiopic) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- ፕሮፌሽናል አይኮኖች ከ FontAwesome (ምንም አይነት Emoji አልተጠቀምንም) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- የቴሌግራም ሚኒ አፕሊኬሽን ማገናኛ -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- የዲዛይን ፋይል ማገናኛ -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="application-wrapper" class="app-container">

        <!-- ==========================================
             1. ዋና ማሳያ ገጽ (Dashboard Screen)
        =========================================== -->
        <section id="screen-dashboard" class="app-screen active-screen">
            
            <!-- የላይኛው ራስጌ -->
            <header class="dashboard-header">
                <div class="user-profile-section">
                    <div class="profile-image-container">
                        <i class="fa-solid fa-church"></i>
                    </div>
                    <div class="user-greeting-info">
                        <span class="greeting-time" id="time-based-greeting">ሰላም፣</span>
                        <h1 class="user-full-name" id="display-user-name">እየጫነ ነው...</h1>
                    </div>
                </div>
            </header>

            <!-- ፕሮፌሽናል የዲጂታል መታወቂያ ካርድ (Glassmorphism) -->
            <article class="membership-card-container">
                <div class="glass-morphism-card">
                    <div class="card-header-row">
                        <div class="organization-branding">
                            <i class="fa-solid fa-cross"></i>
                            <span class="brand-title">አባ ሙሴ ጸሊም ህብረት</span>
                        </div>
                        <div class="verification-icon">
                            <i class="fa-solid fa-qrcode"></i>
                        </div>
                    </div>
                    <div class="card-details-row">
                        <h2 class="member-name-display" id="card-member-name">ስም በመፈለግ ላይ...</h2>
                        <div class="member-id-display">
                            <span>መለያ ቁጥር: </span>
                            <span id="card-member-id">00000000</span>
                        </div>
                    </div>
                    <div class="card-footer-row">
                        <div class="membership-status active-status">
                            <i class="fa-solid fa-circle-check"></i>
                            <span>ንቁ አባል</span>
                        </div>
                    </div>
                </div>
            </article>

            <!-- ዋና የአገልግሎት ማውጫ (Services Grid) -->
            <nav class="services-grid-navigation">
                <h3 class="section-heading">ዋና አገልግሎቶች</h3>
                <div class="grid-layout">
                    
                    <button class="grid-card-item" onclick="appNavigation.openScreen('screen-prayer')">
                        <div class="card-icon-wrapper">
                            <i class="fa-solid fa-envelope-open-text"></i>
                        </div>
                        <span class="card-title">የምስጢር ሳጥን</span>
                    </button>
                    
                    <button class="grid-card-item" onclick="appNavigation.openScreen('screen-tutoring')">
                        <div class="card-icon-wrapper">
                            <i class="fa-solid fa-graduation-cap"></i>
                        </div>
                        <span class="card-title">ቱቶሪያል ጥያቄ</span>
                    </button>

                    <button class="grid-card-item" onclick="window.Telegram.WebApp.showAlert('የጥናት መርጃዎች በቅርቡ ይጫናሉ።')">
                        <div class="card-icon-wrapper">
                            <i class="fa-solid fa-book-open-reader"></i>
                        </div>
                        <span class="card-title">የጥናት መርጃ</span>
                    </button>

                    <button class="grid-card-item" onclick="window.Telegram.WebApp.showAlert('የዕለት መንፈሳዊ ስንቅ በቅርቡ ይጀምራል።')">
                        <div class="card-icon-wrapper">
                            <i class="fa-solid fa-quote-left"></i>
                        </div>
                        <span class="card-title">የዕለት ስንቅ</span>
                    </button>

                </div>
            </nav>
        </section>

        <!-- ==========================================
             2. የምስጢር ሳጥን ቅጽ (Prayer/Secret Box Screen)
        =========================================== -->
        <section id="screen-prayer" class="app-screen hidden-screen">
            <header class="sub-screen-header">
                <button class="back-navigation" onclick="appNavigation.goBack()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h2 class="sub-screen-title">የምስጢር ሳጥን</h2>
                <div class="header-action-placeholder"></div>
            </header>
            <div class="screen-content-scrollable">
                <form id="prayer-request-form" class="standard-form">
                    <div class="form-group">
                        <label class="form-label" for="secret-message">የልብዎን ሀሳብ በነጻነት ያካፍሉን (በምስጢር ይጠበቃል)</label>
                        <textarea id="secret-message" class="form-textarea" placeholder="መልእክትዎን እዚህ ይጻፉ..." required></textarea>
                    </div>
                    <button type="submit" class="primary-action-button">
                        <i class="fa-solid fa-paper-plane"></i>
                        <span>መልእክቱን ላክ</span>
                    </button>
                </form>
            </div>
        </section>

        <!-- ==========================================
             3. የቱቶሪያል ጥያቄ ቅጽ (Tutoring Request Screen)
        =========================================== -->
        <section id="screen-tutoring" class="app-screen hidden-screen">
            <header class="sub-screen-header">
                <button class="back-navigation" onclick="appNavigation.goBack()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h2 class="sub-screen-title">የቱቶሪያል ድጋፍ መጠየቂያ</h2>
                <div class="header-action-placeholder"></div>
            </header>
            <div class="screen-content-scrollable">
                <form id="tutoring-request-form" class="standard-form">
                    <div class="form-group">
                        <label class="form-label" for="subject-topic">የሚያስቸግርዎ የትምህርት አይነት እና ርዕስ</label>
                        <input type="text" id="subject-topic" class="form-input" placeholder="ለምሳሌ፡ ፊዚክስ (Mechanics)" required>
                    </div>
                    <button type="submit" class="primary-action-button">
                        <i class="fa-solid fa-check"></i>
                        <span>ጥያቄውን አስገባ</span>
                    </button>
                </form>
            </div>
        </section>

        <!-- ==========================================
             4. የአስተዳዳሪ መቆጣጠሪያ (Admin Control Panel)
        =========================================== -->
        <section id="screen-admin" class="app-screen hidden-screen">
            <header class="sub-screen-header">
                <h2 class="sub-screen-title">የአስተዳዳሪ መቆጣጠሪያ</h2>
            </header>
            <div class="screen-content-scrollable">
                <div class="standard-form admin-card">
                    <h3 class="admin-header">
                        <i class="fa-solid fa-bullhorn"></i> አጠቃላይ መልእክት ማሰራጫ
                    </h3>
                    <form id="admin-broadcast-form">
                        <div class="form-group">
                            <label class="form-label" for="broadcast-message">መልእክቱን ይጻፉ (ለሁሉም አባላት በስማቸው ይላካል)</label>
                            <textarea id="broadcast-message" class="form-textarea" placeholder="መልእክትዎን እዚህ ይጻፉ..." required></textarea>
                        </div>
                        <button type="submit" class="primary-action-button">
                            <i class="fa-solid fa-share-nodes"></i>
                            <span>መልእክት ላክ</span>
                        </button>
                    </form>
                </div>
            </div>
        </section>

        <!-- ==========================================
             የታችኛው ማውጫ (Bottom Navigation Bar)
        =========================================== -->
        <nav class="bottom-navigation-bar">
            
            <button class="nav-button active-nav-item" onclick="appNavigation.switchTab('screen-dashboard')">
                <i class="fa-solid fa-house"></i>
                <span>ዋና ገጽ</span>
            </button>
            
            <button class="nav-button" onclick="appNavigation.switchTab('screen-prayer')">
                <i class="fa-solid fa-box-archive"></i>
                <span>ምስጢር ሳጥን</span>
            </button>
            
            <!-- ይህ በተን ለተራ ተማሪዎች አይደነገግም፣ ለአስተዳዳሪው ብቻ በ JS በኩል ይታያል -->
            <button class="nav-button" id="admin-nav-item" style="display: none;" onclick="appNavigation.switchTab('screen-admin')">
                <i class="fa-solid fa-screwdriver-wrench"></i>
                <span style="color:var(--status-danger);">አስተዳዳሪ</span>
            </button>
            
        </nav>

    </main>
    
    <!-- ጃቫስክሪፕት ማገናኛ -->
    <script src="script.js"></script>
</body>
</html>
