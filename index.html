<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>አባ ሙሴ ጸሊም Mini App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <img src="https://via.placeholder.com/60" alt="Logo" id="app-logo">
            <h1>አባ ሙሴ ጸሊም ህብረት</h1>
        </header>
        <div class="id-card">
            <div class="id-header">የአባልነት መታወቂያ</div>
            <div class="id-body">
                <img src="https://via.placeholder.com/80" alt="User Photo" class="user-photo">
                <div class="user-info">
                    <h2 id="user-name">ተማሪ ስም...</h2>
                    <p id="user-id">ID: 000000</p>
                    <span class="status-badge">ንቁ አባል ✅</span>
                </div>
            </div>
        </div>
        <div class="menu-grid">
            <div class="menu-item" onclick="showPage('library')"><span class="icon">📚</span><p>የጥናት መርጃ</p></div>
            <div class="menu-item" onclick="showPage('prayer')"><span class="icon">🙏</span><p>የምስጢር ሳጥን</p></div>
            <div class="menu-item" onclick="showPage('daily')"><span class="icon">📖</span><p>የዕለት ስንቅ</p></div>
            <div class="menu-item" onclick="showPage('tutor')"><span class="icon">🎓</span><p>ቱቶሪያል</p></div>
        </div>
        <div id="page-container" class="hidden">
            <button class="back-btn" onclick="hidePage()">⬅ ተመለስ</button>
            <div id="page-content"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
